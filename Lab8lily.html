<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Art Work Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .form-container {
            background-color: #ffffff;
            border: 1px solid #ccc;
            max-width: 650px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            background-color: #666;
            color: white;
            padding: 10px;
            margin: -20px -20px 20px -20px;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .highlight {
            background-color: #fff3cd !important;
        }

        /* Gaya Error dengan TANDA SERU MERAH */
        .error {
            background-color: #f8d7da !important;
            border: 1px solid #dc3545 !important;
            /* Ikon tanda seru merah dalam bulatan */
            background-image: url('https://cdn-icons-png.flaticon.com/16/753/753345.png'); 
            background-repeat: no-repeat;
            background-position: 97% center;
        }

        .flex-row {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .box-section {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            flex: 1;
        }

        .button-row {
            background-color: #bcbcbc;
            padding: 15px;
            margin: 20px -20px -20px -20px;
            text-align: center;
        }

        button {
            background-color: #ff9900;
            color: black;
            border: 1px solid #333;
            padding: 8px 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
    <script src="Lab9lily.js"></script>
</head>
<body>

<div class="form-container">
    <h2>Edit Your Personal Profile</h2>
    <form id="mainForm">
        <label>Name</label>
        <input type="text" name="name" class="required hilightable">

        <label>Email</label>
        <input type="text" name="email" class="required hilightable">

        <div class="flex-row">
            <div style="flex: 1;">
    <label>Education Level</label>
    <select class="hilightable">
        <option value="">Choose education level</option>
        <option value="diploma">Diploma</option>
        <option value="degree">Bachelor's Degree</option>
        <option value="master">Master's Degree</option>
        <option value="phd">PhD</option>
    </select>

    <label>Nationality</label>
    <select class="hilightable">
        <option value="">Choose nationality</option>
        <option value="malaysia">Malaysia</option>
        <option value="indonesia">Indonesia</option>
        <option value="singapore">Singapore</option>
        <option value="thailand">Thailand</option>
        <option value="others">Others</option>
    </select>
    
    <label>Skills</label>
    <input type="text" name="skills" class="hilightable">
</div>

            <div style="flex: 1;">
                <div class="box-section">
                    <strong>Gender</strong><br>
                    <input type="radio" name="type" checked>Male<br>
                    <input type="radio" name="type"> Female
                </div>

                <div class="box-section">
                    <strong>Interests</strong><br>
                    <input type="checkbox" name="cc"> Travelling<br>
                    <input type="checkbox" name="cc"> Reading<br>
                    <input type="checkbox" name="cc"> Sports & Fitness<br>
                    <input type="checkbox" name="cc"> Cooking
                </div>
            </div>
        </div>

        <label>Age</label>
        <input type="text" name="year" class="required hilightable" style="width: 100px;">

        <label>Address</label>
        <input type="text" name="museum" class="hilightable">

        <div class="button-row">
            <button type="submit">Submit</button>
            <button type="reset">Clear Form</button>
        </div>
    </form>
</div>

</body>
</html>
