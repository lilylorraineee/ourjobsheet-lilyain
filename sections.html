<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Jobsheet Sections</title>

<style>
/* ===== RESET & SCROLL HALIMUNAN ===== */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  font-family: Arial, sans-serif;
  text-align: center;
  background-color: #000;
  overflow-x: hidden;
  overflow-y: auto; 
  scrollbar-width: none; 
  -ms-overflow-style: none;
}

body::-webkit-scrollbar {
  display: none;
  width: 0 !important;
}

/* ===== BACKGROUND VIDEO ===== */
#bgVideo {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}

/* ===== NAVBAR ===== */
nav {
  position: fixed;
  top: 0; width: 100%;
  background-color: #FFD1E8;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 1000;
}
nav img { height: 60px; }
nav .nav-links { display: flex; gap: 20px; margin-right: 20px; }
nav a { color: #8B5A8B; text-decoration: none; font-size: 1.1em; font-weight: bold; }

/* ===== PAGE TITLE ===== */
.page-title {
  margin-top: 120px;
  font-size: 2.5em;
  font-weight: bold;
  color: #E91E63;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  display: inline-block;
  padding: 12px 25px;
  border: 3px solid #FFB6D9;
  border-radius: 12px;
  background-color: rgba(255, 255, 255, 0.8);
  position: relative;
  z-index: 1;
}

/* ===== SECTIONS CONTAINER ===== */
.sections-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
  padding: 50px 20px;
  position: relative;
  z-index: 1;
}

.section {
  width: 350px;
  height: 350px;
  position: relative;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  border-radius: 15px;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-size: cover;      
  background-position: center;  
  border: 4px solid white;
  overflow: hidden;
}
.section::before {
  content: "";
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.4);
  z-index:0;
}
#lily { background-image: url('lily.jpeg'); }
#ain { background-image: url('ain.jpeg'); }
.section:hover { transform: scale(1.05); }

/* ===== POPUP (KOTAK CHAPTER SAMA RATA) ===== */
.job-popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 800px;
  max-height: 85vh;
  background-color: rgba(255,255,255,0.98);
  display: none;
  flex-direction: column;
  align-items: center;
  z-index: 10000;
  padding: 30px 20px;
  border-radius: 20px;
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
  overflow-y: auto;
  scrollbar-width: none;
}
.job-popup::-webkit-scrollbar { display: none; }

/* Styling Kotak Chapter bagi cantik & sama rata */
.job-popup .chapter {
  width: 95%; /* Kotak sama lebar */
  background-color: #FFE0F0;
  padding: 20px;
  border-radius: 15px;
  border: 2px solid #FFB6D9;
  display: flex;
  flex-direction: column; /* Tajuk atas, butang bawah */
  align-items: center;
  margin-bottom: 20px;
  box-sizing: border-box;
}

.job-popup .chapter h3 { 
  width: 100%; 
  color: #8B5A8B; 
  margin-bottom: 15px; 
  font-size: 1.3em;
  text-align: center;
}

/* Container butang dalam chapter */
.btn-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.job-popup button {
  padding: 12px 20px;
  background-color: #f12a8e;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}
.job-popup button:hover { background-color: #ff6eb4; transform: translateY(-2px); }

.job-popup .close-btn {
  background-color: #8B5A8B;
  color: #fff;
  padding: 10px 25px;
  margin-bottom: 20px;
  border-radius: 10px;
}

/* ===== FOOTER ===== */
footer {
  background-color: #FFD1E8;
  color: #8B5A8B;
  padding: 20px;
  width: 100%;
  position: relative; 
  margin-top: 50px;
  z-index: 1;
}

@media(max-width:768px){
  .sections-container { flex-direction: column; gap:25px; padding-bottom: 50px; }
  .section { width: 300px; height: 300px; }
  .page-title { font-size: 1.8em; }
}

.cursor-dot {
  position: fixed; top: 0; left: 0; width: 12px; height: 12px;
  border-radius: 50%; background: rgba(255,0,150,0.7);
  pointer-events: none; z-index: 20000;
}
</style>
</head>
<body>

<video id="bgVideo" autoplay loop muted playsinline>
  <source src="bgvsection.mp4" type="video/mp4">
</video>

<audio id="bgSound" autoplay loop><source src="bgs2.mp3" type="audio/mpeg"></audio>
<audio id="clickSound" preload="auto"><source src="pop.mp3" type="audio/mpeg"></audio>

<nav>
  <img src="ikmlogo.png" alt="IKM Logo">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
  </div>
</nav>

<div class="page-title">OUR JOBSHEET</div>

<div class="sections-container">
  <div id="lily" class="section">
    <h2>Lily Lorraine</h2>
    <p>View my jobsheets</p>
  </div>
  <div id="ain" class="section">
    <h2>Ain</h2>
    <p>View my jobsheets</p>
  </div>
</div>

<div class="job-popup" id="lilyPopup">
  <button class="close-btn">Close</button>
  <h2 style="color:#E91E63; margin-bottom:20px;">Lily's Jobsheet</h2>
</div>

<div class="job-popup" id="ainPopup">
  <button class="close-btn">Close</button>
  <h2 style="color:#E91E63; margin-bottom:20px;">Ain's Jobsheet</h2>
</div>

<footer>&copy; 2026 lilyain website. All rights reserved.</footer>

<div id="cursorContainer"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('bgVideo').playbackRate = 0.3;
});

const clickSound = document.getElementById("clickSound");

// Handle Popups
const sections = [{id:"lily", popup:"lilyPopup"}, {id:"ain", popup:"ainPopup"}];
sections.forEach(s => {
  document.getElementById(s.id).addEventListener("click", () => {
    clickSound.currentTime = 0; clickSound.play();
    document.getElementById(s.popup).style.display = "flex";
  });
  document.getElementById(s.popup).querySelector(".close-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    clickSound.currentTime = 0; clickSound.play();
    document.getElementById(s.popup).style.display = "none";
  });
});

const chapters = [
  { chapter: 1, jobsheets: [1, 2, 3] },
  { chapter: 2, jobsheets: [4, 5, 6] },
  { chapter: 3, jobsheets: [7, 8, 9] }
];

const chapterTitles = { 1: "Chapter 1: HTML5", 2: "Chapter 2: CSS3", 3: "Chapter 3: JavaScript" };

function populateChapters(popup, type) {
  chapters.forEach(ch => {
    const chapDiv = document.createElement("div");
    chapDiv.className = "chapter";

    const chapTitle = document.createElement("h3");
    chapTitle.textContent = chapterTitles[ch.chapter] || "Chapter " + ch.chapter;
    chapDiv.appendChild(chapTitle);

    const btnGrid = document.createElement("div");
    btnGrid.className = "btn-grid";

    ch.jobsheets.forEach(jsNum => {
      const btn = document.createElement("button");
      btn.textContent = "JS " + jsNum;
      btn.onclick = (e) => {
        e.stopPropagation();
        clickSound.currentTime = 0; clickSound.play();
        window.location.href = (type === 'lily') ? `Lab${jsNum}.html` : `JS${jsNum}.html`;
      };
      btnGrid.appendChild(btn);

      if(jsNum === 9) {
        const extraBtn = document.createElement("button");
        extraBtn.textContent = "EXTRA";
        extraBtn.style.backgroundColor = "#ff77bc";
        extraBtn.onclick = (e) => {
          e.stopPropagation();
          clickSound.currentTime = 0; clickSound.play();
          // TUKAR LINK WEBSITE ANDA DI SINI
          window.location.href = (type === 'lily') ? "https://lily-extra-link.com" : "https://ain-extra-link.com";
        };
        btnGrid.appendChild(extraBtn);
      }
    });

    chapDiv.appendChild(btnGrid);
    popup.appendChild(chapDiv);
  });
}

populateChapters(document.getElementById("lilyPopup"), 'lily');
populateChapters(document.getElementById("ainPopup"), 'ain');

// Cursor Trail
const dots = [];
for(let i=0; i<12; i++) {
  const dot = document.createElement("div");
  dot.className = "cursor-dot";
  document.getElementById("cursorContainer").appendChild(dot);
  dots.push({el: dot, x:0, y:0});
}
let mouseX=0, mouseY=0;
document.addEventListener("mousemove", e => { mouseX=e.clientX; mouseY=e.clientY; });
function animate() {
  let x=mouseX, y=mouseY;
  dots.forEach(dot => {
    dot.x += (x - dot.x)*0.2; dot.y += (y - dot.y)*0.2;
    dot.el.style.transform = `translate(${dot.x}px, ${dot.y}px)`;
    x=dot.x; y=dot.y;
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
