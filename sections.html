<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Jobsheet Sections</title>

<style>
/* ===== RESET & FULLSCREEN ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  text-align: center;
  background-color: transparent;
  overflow: hidden;
}

/* ===== BACKGROUND VIDEO ===== */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}

/* ===== NAVBAR ===== */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background-color: #FFD1E8;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 1000;
}
nav img { height: 70px; }
nav .nav-links {
  display: flex;
  gap: 20px;
  margin-right: 50px;
}
nav a {
  color: #8B5A8B;
  text-decoration: none;
  font-size: 1.1em;
  font-weight: bold;
}
nav a:hover { text-decoration: underline; }

/* ===== PAGE TITLE ===== */
.page-title {
  margin-top: 120px;
  font-size: 2.8em;
  font-weight: bold;
  color: #E91E63;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  display: inline-block;
  padding: 12px 25px;
  border: 3px solid #FFB6D9;
  border-radius: 12px;
  background-color: rgba(255, 255, 255, 0.8);
  position: relative;
  z-index: 1;
}

/* ===== SECTIONS ===== */
.sections-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 50px;
  flex-wrap: wrap;
  padding: 30px;
  height: calc(100% - 200px);
  box-sizing: border-box;
  position: relative;
  z-index: 1;
}

.section {
  width: 420px;
  height: 420px;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s ease;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  border-radius: 15px;
  color: rgb(255, 255, 255);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background-size: cover;      
  background-position: center;  
  background-repeat: no-repeat;
  border: 3px solid white;
}
.section::before {
  content: "";
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.3);
  border-radius: 15px;
  z-index:0;
}
.section h2, .section p {
  position: relative;
  z-index:1;
  margin: 0.5em 0;
}
#lily { background-image: url('lily.jpeg'); }
#ain { background-image: url('ain.jpeg'); }
.section:hover { transform: scale(1.05); }

/* ===== POPUP ===== */
.job-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 1200px;
  max-height: 90vh;
  background-color: rgba(255,255,255,0.97);
  display: none;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  gap: 25px;
  z-index: 10000;
  padding: 30px;
  overflow-y: auto;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  border-radius: 15px;
}

/* Chapters */
.job-popup .chapter {
  width: 100%;
  max-width: 100%;
  background-color: #FFE0F0;
  padding: 20px;
  border-radius: 12px;
  border: 2px solid #FFB6D9;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  align-items: center;
}
.job-popup .chapter h3 {
  width: 100%;
  margin-bottom: 12px;
  font-size: 1.3em;
  font-weight: bold;
  color: #8B5A8B;
}

/* Buttons */
.job-popup button {
  flex: 1 1 120px;
  min-width: 120px;
  max-width: 180px;
  padding: 14px 22px;
  font-size: 1em;
  border-radius: 6px;
  background-color: #f12a8e;
  color: #000000;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.job-popup button:hover {
  background-color: #FFCCE6;
  transform: scale(1.05);
}

/* Close button */
.job-popup .close-btn {
  background-color: #8B5A8B;
  color: #FFD1E8;
  font-size: 1.2em;
  padding: 14px 28px;
  border-radius: 10px;
  margin-bottom: 15px;
}
.job-popup .close-btn:hover {
  background-color: #6B4C6B;
}

/* ===== FOOTER ===== */
footer {
  background-color: #FFD1E8;
  color: #8B5A8B;
  text-align: center;
  padding: 15px;
  position: fixed;
  bottom: 0;
  width: 100%;
  z-index: 1;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .section { width: 360px; height: 360px; }
}
@media(max-width:768px){
  .sections-container{ flex-direction: column; gap:25px; }
  .section{ width: 280px; height:280px; }
  .page-title { font-size: 2em; }
  .job-popup .chapter button{ width: 90%; flex: 1 1 auto; }
}

/* ===== CURSOR TRAIL ===== */
.cursor-dot {
  position: fixed;
  top: 0;
  left: 0;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255,0,150,0.7);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 20000;
}
</style>
</head>
<body>

<video id="bgVideo" autoplay loop muted playsinline>
  <source src="bgvsection.mp4" type="video/mp4">
</video>

<audio id="bgSound" autoplay loop>
  <source src="bgs2.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound" preload="auto">
  <source src="pop.mp3" type="audio/mpeg">
</audio>

<nav>
  <img src="ikmlogo.png" alt="IKM Logo">
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="aboutus.html" class="nav-link">About Us</a>
  </div>
</nav>

<div class="page-title">OUR JOBSHEET</div>

<div class="sections-container">
  <div id="lily" class="section">
    <h2>Lily Lorraine</h2>
    <p>This is my jobsheet submit section</p>
    <p>Click me to view my jobsheets!</p>
  </div>

  <div id="ain" class="section">
    <h2>Ain</h2>
    <p>This is my jobsheet submit section</p>
    <p>Click me to view my jobsheets!</p>
  </div>
</div>

<div class="job-popup" id="lilyPopup">
  <button class="close-btn">Close</button>
  <div class="popup-title">Lily's Jobsheet</div>
</div>
<div class="job-popup" id="ainPopup">
  <button class="close-btn">Close</button>
  <div class="popup-title">Ain's Jobsheet</div>
</div>

<footer>
&copy; 2026 lilyain website. All rights reserved.
</footer>

<div id="cursorContainer"></div>

<script>
// Slow down background video
document.addEventListener('DOMContentLoaded', function() {
  var bgVideo = document.getElementById('bgVideo');
  if(bgVideo) bgVideo.playbackRate = 0.3;
});

// Click sound
const clickSound = document.getElementById("clickSound");

// NAVBAR SOUND
document.querySelectorAll(".nav-link").forEach(link=>{
  link.addEventListener("click", function(e){
    e.preventDefault();
    const url=this.href;
    clickSound.currentTime=0; clickSound.play();
    setTimeout(()=>window.location.href=url,300);
  });
});

// POPUP HANDLERS
const sections = [
  {id:"lily", popup:"lilyPopup"},
  {id:"ain", popup:"ainPopup"}
];
sections.forEach(s=>{
  const sec = document.getElementById(s.id);
  const pop = document.getElementById(s.popup);
  sec.addEventListener("click", ()=>{
    clickSound.currentTime=0; clickSound.play();
    pop.style.display="flex";
  });
  pop.querySelector(".close-btn").addEventListener("click",(e)=>{
    e.stopPropagation();
    clickSound.currentTime=0; clickSound.play();
    pop.style.display="none";
  });
});

// Chapters + Jobsheets
const chapters = [
  { chapter: 1, jobsheets: [1, 2, 3] },
  { chapter: 2, jobsheets: [4, 5, 6] },
  { chapter: 3, jobsheets: [7, 8, 9] },
  { chapter: 4, jobsheets: [10, 11] },
  { chapter: 5, jobsheets: [12, 13] },
  { chapter: 6, jobsheets: [14] },
  { chapter: 7, jobsheets: [15] },
];
const chapterTitles = {
  1: "Chapter 1: HTML5",
  2: "Chapter 2: CSS3",
  3: "Chapter 3: JavaScript",
  4: "Chapter 4: ",
  5: "Chapter 5: ",
  6: "Chapter 6: ",
  7: "Chapter 7: "
};

function populateChapters(popup){
  chapters.forEach(ch=>{
    const chapDiv = document.createElement("div");
    chapDiv.className = "chapter";
    const chapTitle = document.createElement("h3");
    chapTitle.textContent = chapterTitles[ch.chapter] || "Chapter "+ch.chapter;
    chapDiv.appendChild(chapTitle);

    ch.jobsheets.forEach(jsNum=>{
      const btn = document.createElement("button");
      btn.textContent = "JOBSHEET " + jsNum;
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        clickSound.currentTime = 0; clickSound.play();
        let url="";
        switch(jsNum){
          case 1: url="LAB1_HTML5.html"; break;
          case 2: url="LAB2_HTML5.html"; break;
          case 3: url="LAB3_HTML5.html"; break;
          case 4: url="Lab4.html"; break;
          case 5: url="Lab5.html"; break;
          case 6: url="Lab6.html"; break;
          case 7: url="Lab7lily.html"; break;
          case 8: url="Lab8lily.html"; break;
          case 9: url="Lab9lily.html"; break;
          default: url="jobsheet"+jsNum+".html";
        }
        window.location.href = url;
      });
      chapDiv.appendChild(btn);

      // TAMBAHAN: Selepas Jobsheet 9 di Chapter 3 Lily, tambah kotak Extra Jobsheet
      if(jsNum === 9) {
        const extraBtn = document.createElement("button");
        extraBtn.textContent = "EXTRA JOBSHEET";
        // Warna boleh dikekalkan atau diubah sedikit jika mahu
        extraBtn.addEventListener("click", (e)=>{
          e.stopPropagation();
          clickSound.currentTime = 0; clickSound.play();
          window.location.href = "Extra_Jobsheet.html";
        });
        chapDiv.appendChild(extraBtn);
      }
    });
    popup.appendChild(chapDiv);
  });
}

function populateChaptersAin(popup){
  chapters.forEach(ch=>{
    const chapDiv = document.createElement("div");
    chapDiv.className = "chapter";
    const chapTitle = document.createElement("h3");
    chapTitle.textContent = chapterTitles[ch.chapter] || "Chapter "+ch.chapter;
    chapDiv.appendChild(chapTitle);

    ch.jobsheets.forEach(jsNum=>{
      const btn = document.createElement("button");
      btn.textContent = "JOBSHEET " + jsNum;
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        clickSound.currentTime = 0; clickSound.play();
        let url="";
        switch(jsNum){
          case 1: url="JS1.html"; break;
          case 2: url="JS 2.html"; break;
          case 3: url="JS 3.html"; break;
          case 4: url="JS4.html"; break;
          case 5: url="jobsheet 5.html"; break;
          case 6: url="JS 6.html"; break;
          default: alert("Jobsheet Ain belum tersedia"); return;
        }
        window.location.href = url;
      });
      chapDiv.appendChild(btn);
    });
    popup.appendChild(chapDiv);
  });
}

populateChapters(document.getElementById("lilyPopup"));
populateChaptersAin(document.getElementById("ainPopup"));

// ===== CURSOR COMET TRAIL =====
const cursorContainer = document.getElementById("cursorContainer");
const trailLength = 12;
const dots = [];
for(let i=0;i<trailLength;i++){
  const dot = document.createElement("div");
  dot.className="cursor-dot";
  cursorContainer.appendChild(dot);
  dots.push({el: dot, x:0, y:0});
}
let mouseX=0, mouseY=0;
document.addEventListener("mousemove", e=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
});
function animateDots(){
  let x=mouseX, y=mouseY;
  dots.forEach((dot,i)=>{
    dot.x += (x - dot.x)*0.2;
    dot.y += (y - dot.y)*0.2;
    dot.el.style.transform = `translate(${dot.x}px, ${dot.y}px)`;
    x=dot.x;
    y=dot.y;
  });
  requestAnimationFrame(animateDots);
}
animateDots();
</script>

</body>
</html>
