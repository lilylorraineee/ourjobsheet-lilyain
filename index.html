<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Jobsheet Page</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
  position: relative;
  background-color: #000;
  height: 100vh;
  overflow: hidden;
}

/* Background Video */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* Navigation */
nav {
  position: relative;
  z-index: 10;
  background-color: #FFD1E8;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
nav img { height: 70px; }
nav .nav-links { display: flex; gap: 20px; margin-right: 50px; }
nav a { color: #8B5A8B; text-decoration: none; font-size: 1.1em; font-weight: bold; }
nav a:hover { text-decoration: underline; }

/* Homepage */
.homepage {
  padding: 50px 20px;
  position: relative;
  z-index: 1;
}
.homepage h1 {
  font-size: 3em;
  margin: 5px 0 30px 0;
  color: #ff26ff;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  -webkit-text-stroke: 2px black;
}

/* Content */
.content-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 30px;
  margin-bottom: 40px;
}
.content-section img, .profile-img {
  max-width: 250px;
  border: 4px solid #FFB6D9;
  border-radius: 15px;
  transition: all 0.3s ease;
}
.content-section img:hover, .profile-img:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(255,182,217,0.4);
}
.content-text {
  background-color: rgba(255, 209, 232, 0.9);
  padding: 20px;
  border-radius: 10px;
  color: #000000;
  max-width: 400px;
  border: 2px solid #FFB6D9;
}
.content-text p {
  font-size: 1.1em;
  line-height: 1.6;
}

/* Button */
.btn {
  padding: 15px 30px;
  margin: 5px;
  margin-bottom: 60px;
  font-size: 1em;
  cursor: pointer;
  border: none;
  border-radius: 5px;
  background-color: #FFB6D9;
  color: #000000;
  font-weight: bold;
  transition: all 0.1s ease;
}
.btn:hover {
  background-color: #FFCCE6;
  transform: scale(1.15);
  box-shadow: 0 5px 15px rgba(255,182,217,0.5);
}

/* Footer */
footer {
  background-color: #FFD1E8;
  color: #8B5A8B;
  text-align: center;
  padding: 15px;
  position: fixed;
  bottom: 0px;
  width: 100%;
  z-index: 10;
}

/* Sound Toggle Button - bottom right */
#soundToggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  font-size: 1.6em;
  background: rgba(255, 255, 255, 0.7);
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  cursor: pointer;
  color: #E91E63;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}
#soundToggle:hover {
  background: rgba(255, 255, 255, 0.9);
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- Background Video -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="bgv2.mp4" type="video/mp4">
</video>

<!-- Background Music -->
<audio id="bgMusic" autoplay loop>
  <source src="bgs1.mp3" type="audio/mpeg">
</audio>

<!-- Button Click Sound -->
<audio id="popSound" preload="auto">
  <source src="pop.mp3" type="audio/mpeg">
</audio>

<!-- Button Hover Riser Sound -->
<audio id="riserSound" preload="auto">
  <source src="riser.mp3" type="audio/mpeg">
</audio>

<!-- Sound Toggle Button -->
<button id="soundToggle">🔊</button>

<nav>
  <img src="ikmlogo.png" alt="IKM Logo">
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Home</a>
    <a href="aboutus.html" class="nav-link">About Us</a>
  </div>
</nav>

<div class="homepage">
  <h1> Our Jobsheet Submit</h1>

  <div class="content-section">
    <img src="lilyain.jpeg" alt="Shinchan" class="profile-img">
    <div class="content-text">
      <p style="font-size:1.4em;font-weight:bold;">Hi! We are Lily & Ain</p>
      <p>This is our jobsheet project. It showcases our work and dedication to web development.</p>
    </div>
  </div>

  <button class="btn" id="sectionBtn">CLICK HERE TO REVIEW OUR JOBSHEETS</button>
  <button class="btn" id="aboutBtn">ABOUT US</button>
</div>

<footer>
&copy; 2026 lilyain website. All rights reserved.
</footer>

<script>
const popSound = document.getElementById("popSound");
const bgMusic = document.getElementById("bgMusic");
const riserSound = document.getElementById("riserSound");
const startBtn = document.getElementById("sectionBtn");
const soundToggle = document.getElementById("soundToggle");

let soundOn = true;

// Set background music volume
bgMusic.volume = 0.5;

// Play background music once user interacts (autoplay fix)
document.addEventListener("click", () => { bgMusic.play(); }, { once: true });

// Button click sound & redirect
startBtn.addEventListener("click", () => {
  if(soundOn){ popSound.currentTime = 0; popSound.play(); }
  setTimeout(() => { window.location.href = "sections.html"; }, 350);
});

// Button hover riser sound
startBtn.addEventListener("mouseenter", () => { if(soundOn){ riserSound.currentTime = 0; riserSound.play(); } });
startBtn.addEventListener("mouseleave", () => { riserSound.pause(); riserSound.currentTime = 0; });

// Nav links click sound
document.querySelectorAll(".nav-link").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    const url = this.href;
    if(soundOn){ popSound.currentTime = 0; popSound.play(); }
    setTimeout(() => { window.location.href = url; }, 300);
  });
});

// Cursor Trail Effect
const positions = [];
const numberOfParticles = 12;
document.addEventListener("mousemove", (e) => {
  positions.push({ x: e.clientX, y: e.clientY });
  if (positions.length > numberOfParticles) positions.shift();

  positions.forEach((pos, i) => {
    let p = document.getElementById(`cursor-${i}`);
    if (!p) {
      p = document.createElement("div");
      p.id = `cursor-${i}`;
      p.style.position = "fixed";
      p.style.borderRadius = "50%";
      p.style.pointerEvents = "none";
      p.style.background = "radial-gradient(circle, #87CEEB, #4A90E2)";
      document.body.appendChild(p);
    }
    const size = 4 + i;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = pos.x + "px";
    p.style.top = pos.y + "px";
    p.style.opacity = i / numberOfParticles;
  });
});

// Slow down background video
document.getElementById("bgVideo").playbackRate = 0.3;

// Sound Toggle Logic
soundToggle.addEventListener("click", () => {
  soundOn = !soundOn;
  bgMusic.muted = !soundOn;
  popSound.muted = !soundOn;
  riserSound.muted = !soundOn;
  soundToggle.textContent = soundOn ? "🔊" : "🔇";
});
</script>

</body>
</html>
