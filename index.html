<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Student Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
body, html { height:100%; overflow:hidden; }

#bgVideo {
  position: fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;
}

nav { background-color: rgba(255,209,232,0.9); display:flex; justify-content:space-between; align-items:center; padding:15px 30px; position:relative; z-index:10; }
nav img { height:60px; }
nav a { margin-left:20px; color:#8B5A8B; text-decoration:none; font-weight:bold; transition:0.2s; }
nav a:hover { color:#E91E63; text-shadow:1px 1px 2px #fff; }

.dashboard { padding:60px 30px 30px 30px; color:#000; max-width:1200px; margin:0 auto; }
.dashboard h1 { font-size:2.5em; margin-bottom:15px; color:#FF26FF; text-shadow:2px 2px 6px rgba(0,0,0,0.5); text-align:center; }

.cards { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:20px; justify-content:center; }
.card { flex:1 1 200px; background:rgba(255,182,217,0.8); padding:15px; border-radius:15px; text-align:center; border:2px solid #FFB6D9; transition: all 0.3s ease; cursor:pointer; height:130px; display:flex; flex-direction:column; justify-content:center; }
.card:hover { transform:scale(1.05); box-shadow:0 10px 20px rgba(255,182,217,0.5); }
.card h3 { margin-bottom:8px; }
.card p { font-size:1.4em; font-weight:bold; }

.side-by-side {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.chart-container, .activity {
  width:480px;
  height:380px; 
  background:rgba(255,209,232,0.9);
  padding:15px;
  border-radius:15px;
  border:2px solid #FFB6D9;
  display:flex;
  flex-direction:column;
}
.chart-container h3, .activity h3 { margin-bottom:10px; font-size:1.2em; text-align:center; }

.chart-container canvas {
  max-width: 250px;
  max-height: 260px;
  margin: 0 auto;
}

.activity ul { list-style:none; padding-right:10px; overflow-y:auto; flex:1; }
.activity ul li { background:rgba(255,182,217,0.5); padding:8px; margin-bottom:8px; border-radius:8px; transition:0.3s; cursor:pointer; font-size:0.95em; text-align: left; }
.activity ul li:hover { background:#FFCCE6; transform:scale(1.02); }

.actions { text-align:center; margin-top:10px; }
.actions button { padding:20px 35px; font-size:0.95em; margin:5px; cursor:pointer; border:none; border-radius:8px; background:#FFB6D9; font-weight:bold; transition:0.3s; }
.actions button:hover { background:#FFCCE6; transform:scale(1.1); box-shadow:0 5px 15px rgba(255,182,217,0.5); }

footer { background:rgba(255,209,232,0.9); color:#8B5A8B; text-align:center; padding:12px; position:fixed; bottom:0; width:100%; border-top:2px solid #FFB6D9; z-index:5; }

@media(max-width:1100px){ .side-by-side { flex-direction:column; align-items:center; } .chart-container, .activity { width:90%; height:280px; } }
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="bgv2.mp4" type="video/mp4">
</video>

<nav>
  <img src="ikmlogo.png" alt="IKM Logo">
  <div>
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="#" onclick="localStorage.clear(); location.reload();" style="font-size: 0.8em; opacity: 0.5;">Reset</a>
  </div>
</nav>

<div class="dashboard">
  <h1>Welcome to Student Dashboard</h1>

  <div class="cards">
    <div class="card"><h3>Total Jobsheets</h3><p id="totalCount">30</p></div>
    <div class="card"><h3>Completed</h3><p id="completedCount">0</p></div>
    <div class="card"><h3>In Progress</h3><p id="progressCount">30</p></div>
  </div>

  <div class="side-by-side">
    <div class="chart-container" id="chart">
      <h3>Jobsheet Progress</h3>
      <canvas id="progressChart"></canvas>
    </div>

    <div class="activity" id="activity">
      <h3>Recent Activity</h3>
      <ul id="activityList">
        </ul>
    </div>
  </div>

  <div class="actions">
    <button onclick="window.location.href='secondpage.html'">Start</button>
  </div>
</div>

<footer>
  © 2026 lilyain. All rights reserved.
</footer>

<script>
// 1. Inisialisasi Chart
const ctx = document.getElementById('progressChart').getContext('2d');
const progressChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Completed', 'In Progress'],
        datasets: [{
            data: [0, 30],
            backgroundColor: ['#FF69B4', '#FFB6C1'],
            borderColor: ['#FF1493', '#FF69B4'],
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend:{ position:'bottom' } }
    }
});

// 2. Fungsi Live Update
function updateDashboard() {
    const completedList = JSON.parse(localStorage.getItem('completedJobsheets')) || [];
    const activities = JSON.parse(localStorage.getItem('recentActivities')) || [];

    const total = 30; // 15 Lily + 15 Ain
    const completed = completedList.length;
    const inProgress = total - completed;

    // Update Nombor
    document.getElementById('completedCount').innerText = completed;
    document.getElementById('progressCount').innerText = inProgress;

    // Update Graf
    progressChart.data.datasets[0].data = [completed, inProgress];
    progressChart.update();

    // Update Senarai Aktiviti (5 terbaru)
    const activityUL = document.getElementById('activityList');
    activityUL.innerHTML = '';
    activities.slice().reverse().slice(0, 5).forEach(act => {
        const li = document.createElement('li');
        li.innerText = act;
        activityUL.appendChild(li);
    });
}

// Jalankan fungsi
updateDashboard();
</script>
</body>
</html>
