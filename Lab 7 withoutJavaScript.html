<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="initial-scale=1.0,maximum-scale=1.0,width=device-width">
		
	<title>Lab 7</title>
	
	<link href="css/styles.css" rel="stylesheet" />
   
</head>

<body>
<div class="title">
    <h1>Shopping Cart</h1>
</div>
<table class="table-fill">
    <thead>
        <tr>
            <th colspan="2">Product</th>
            <th>#</th>
            <th>Price</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody>
       

        <tr class="totals">
            <td colspan="4">Subtotal</td>
            <td><script>outputCurrency(subtotal);</script></td>
        </tr>
        <tr class="totals">
            <td colspan="4">Tax</td>
            <td><script>outputCurrency(tax);</script></td>
        </tr>
        <tr class="totals">
            <td colspan="4">Shipping</td>
            <td><script>outputCurrency(shipping);</script></td>
        </tr>
        <tr class="totals focus">
            <td colspan="4">Grand Total</td>
            <td><script>outputCurrency(grand);</script></td>
        </tr>
    </tbody>
</table>
</body>
</html>
