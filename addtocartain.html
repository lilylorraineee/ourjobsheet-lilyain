<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <script src="https://kit.fontawesome.com/b9052ad8b9.js" crossorigin="anonymous"></script>
    <title>Add to Cart - Kedai Saya</title>
    <link href="style.css" rel="stylesheet" />
</head>
<body>

    <div class="utama">
        <div class="pertama">
            <table>
                <thead>
                    <tr>
                        <th>Barang</th>
                        <th>Harga</th>
                        <th>Tindakan</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Kemeja</td>
                        <td>RM25.00</td>
                        <td>
                            <button class="beli" onclick="tambahData({nama: 'Kemeja', harga: 25.00})">
                                <i class="fa-solid fa-basket-shopping"></i> Beli
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>Tudung</td>
                        <td>RM10.00</td>
                        <td>
                            <button class="beli" onclick="tambahData({nama: 'Tudung', harga: 10.00})">
                                <i class="fa-solid fa-basket-shopping"></i> Beli
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>Stocking</td>
                        <td>RM2.00</td>
                        <td>
                            <button class="beli" onclick="tambahData({nama: 'Stocking', harga: 2.00})">
                                <i class="fa-solid fa-basket-shopping"></i> Beli
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>Tie</td>
                        <td>RM10.00</td>
                        <td>
                            <button class="beli" onclick="tambahData({nama: 'Tie', harga: 10.00})">
                                <i class="fa-solid fa-basket-shopping"></i> Beli
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>Blouse</td>
                        <td>RM20.00</td>
                        <td>
                            <button class="beli" onclick="tambahData({nama: 'Blouse', harga: 20.00})">
                                <i class="fa-solid fa-basket-shopping"></i> Beli
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="kedua">
            <h3 style="margin-bottom: 15px; color: #fff;">Bakul Anda</h3>
            
            <div id="troli">
                <p style="color: #fff; font-style: italic;">Bakul kosong</p>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
