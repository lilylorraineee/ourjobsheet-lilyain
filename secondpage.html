<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Jobsheet Page</title>

<style>
/* ===== TOTAL HIDDEN SCROLLBAR ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  text-align: center;
  position: relative;
  background-color: #000;
  width: 100%;
  min-height: 100vh;
  /* Benarkan scroll tapi sorokkan bar kelabu */
  overflow-x: hidden;
  overflow-y: auto; 
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE/Edge */
}

/* Sembunyikan Scrollbar Chrome/Safari/Edge */
body::-webkit-scrollbar {
  display: none;
  width: 0 !important;
}

/* Background Video */
#bgVideo {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* Navigation - Melekat kat atas */
nav {
  position: fixed;
  top: 0; width: 100%;
  z-index: 100;
  background-color: rgba(255, 209, 232, 0.9);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
nav img { height: 50px; }
nav .nav-links { display: flex; gap: 15px; }
nav a { color: #8B5A8B; text-decoration: none; font-weight: bold; font-size: 0.9em; }

/* Content Section */
.homepage {
  padding: 100px 20px 60px 20px;
  position: relative;
  z-index: 1;
}
.homepage h1 {
  font-size: 2.5em;
  margin-bottom: 25px;
  color: #ff26ff;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  -webkit-text-stroke: 1.2px black;
}

.content-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap; /* Untuk mobile: gambar atas, teks bawah */
  margin-bottom: 30px;
}
.profile-img {
  max-width: 220px;
  width: 100%;
  border: 4px solid #FFB6D9;
  border-radius: 15px;
  transition: 0.3s;
}
.content-text {
  background-color: rgba(255, 209, 232, 0.9);
  padding: 20px;
  border-radius: 15px;
  color: #000;
  max-width: 400px;
  border: 2px solid #FFB6D9;
}

/* Buttons */
.btn {
  padding: 15px 25px;
  margin: 10px;
  font-size: 0.9em;
  cursor: pointer;
  border: none;
  border-radius: 10px;
  background-color: #FFB6D9;
  font-weight: bold;
  transition: 0.2s;
  display: inline-block;
}
.btn:hover { transform: scale(1.1); background-color: #FFCCE6; }

/* Footer - Duduk bawah sekali lepas scroll */
footer {
  background-color: rgba(255, 209, 232, 0.9);
  color: #8B5A8B;
  padding: 15px;
  width: 100%;
  border-top: 2px solid #FFB6D9;
  position: relative; 
  margin-top: 40px;
}

/* Sound Toggle */
#soundToggle {
  position: fixed;
  bottom: 20px; right: 20px;
  z-index: 9999;
  background: white; border: none;
  width: 45px; height: 45px; border-radius: 50%;
  cursor: pointer; font-size: 1.2em;
}

/* Mobile Optimasi */
@media(max-width: 600px) {
  .homepage h1 { font-size: 1.8em; }
  .btn { width: 85%; }
}
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline><source src="bgv2.mp4" type="video/mp4"></video>
<audio id="bgMusic" autoplay loop><source src="bgs1.mp3" type="audio/mpeg"></audio>
<audio id="popSound" preload="auto"><source src="pop.mp3" type="audio/mpeg"></audio>
<audio id="riserSound" preload="auto"><source src="riser.mp3" type="audio/mpeg"></audio>

<button id="soundToggle">🔊</button>

<nav>
  <img src="ikmlogo.png" alt="IKM Logo">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
  </div>
</nav>

<div class="homepage">
  <h1>Our Jobsheet Submit</h1>
  <div class="content-section">
    <img src="lilyain.jpeg" alt="Profile" class="profile-img">
    <div class="content-text">
      <p style="font-size:1.3em; font-weight:bold;">Hi! We are Lily & Ain</p>
      <p>This is our jobsheet project. It showcases our work and dedication to web development.</p>
    </div>
  </div>
  <button class="btn" id="sectionBtn">CLICK HERE TO REVIEW OUR JOBSHEETS</button>
  <button class="btn" onclick="window.location.href='aboutus.html'">ABOUT US</button>
</div>

<footer>&copy; 2026 lilyain website. All rights reserved.</footer>

<script>
// SEMUA JAVASCRIPT ASAL ANDA (Sound, Cursor, etc.)
const popSound = document.getElementById("popSound");
const bgMusic = document.getElementById("bgMusic");
const riserSound = document.getElementById("riserSound");
const startBtn = document.getElementById("sectionBtn");
const soundToggle = document.getElementById("soundToggle");

let soundOn = true;
bgMusic.volume = 0.5;
document.addEventListener("click", () => { bgMusic.play(); }, { once: true });

startBtn.addEventListener("click", () => {
  if(soundOn){ popSound.currentTime = 0; popSound.play(); }
  setTimeout(() => { window.location.href = "sections.html"; }, 350);
});

startBtn.addEventListener("mouseenter", () => { if(soundOn){ riserSound.currentTime = 0; riserSound.play(); } });
startBtn.addEventListener("mouseleave", () => { riserSound.pause(); riserSound.currentTime = 0; });

const positions = [];
document.addEventListener("mousemove", (e) => {
  positions.push({ x: e.clientX, y: e.clientY });
  if (positions.length > 12) positions.shift();
  positions.forEach((pos, i) => {
    let p = document.getElementById(`cursor-${i}`);
    if (!p) {
      p = document.createElement("div");
      p.id = `cursor-${i}`;
      p.style.position = "fixed";
      p.style.borderRadius = "50%";
      p.style.pointerEvents = "none";
      p.style.background = "radial-gradient(circle, #87CEEB, #4A90E2)";
      p.style.zIndex = "1000";
      document.body.appendChild(p);
    }
    p.style.width = (4 + i) + "px";
    p.style.height = (4 + i) + "px";
    p.style.left = pos.x + "px";
    p.style.top = pos.y + "px";
    p.style.opacity = i / 12;
  });
});

document.getElementById("bgVideo").playbackRate = 0.3;
soundToggle.addEventListener("click", () => {
  soundOn = !soundOn;
  bgMusic.muted = !soundOn;
  popSound.muted = !soundOn;
  riserSound.muted = !soundOn;
  soundToggle.textContent = soundOn ? "🔊" : "🔇";
});
</script>
</body>
</html>
