<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial jQuery </title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: rgb(129, 14, 14);
            color: rgb(245, 227, 227);
        }
        .container {
            padding: 50px;
            text-align: center;
        }
        .image-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap; /* Agar tombol rapi jika layar kecil */
        }
        button {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            font-weight: bold;
        }
        /* Memberi warna berbeda untuk tombol baru agar menarik */
        #kiriBtn { background-color: rgb(145, 42, 64); color: white; }
        #kananBtn { background-color: rgb(95, 6, 28); color: white; }
        #atasBtn { background-color: rgb(180, 60, 60); color: white; }
        #bawahBtn { background-color: rgb(70, 5, 5); color: white; }

        #gambar {
            width: 300px;
            position: relative;
            /* Tambahkan margin-top pada transisi agar gerakan halus */
            transition: margin-left 0.3s ease, margin-top 0.3s ease;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>TUTORIAL JQUERY</h1>
</div>

<div class="container">
    <div class="image-controls">
        <button id="atasBtn">Ke Atas</button>
        <button id="bawahBtn">Ke Bawah</button>
        <button id="kiriBtn">Ke Kiri</button>
        <button id="kananBtn">Ke Kanan</button>
    </div>
    
    <img id="gambar" src="bsh.gif" alt="Gambar">
</div>

<script>
    $(document).ready(function(){
        let currentLeft = 0;
        let currentTop = 0;

        // Gerak Kanan
        $('#kananBtn').click(function(){
            currentLeft += 300;
            $('#gambar').css('margin-left', currentLeft + 'px');
        });

        // Gerak Kiri
        $('#kiriBtn').click(function(){
            currentLeft -= 300;
            $('#gambar').css('margin-left', currentLeft + 'px');
        });

        // Gerak Atas
        $('#atasBtn').click(function(){
            currentTop -= 300;
            $('#gambar').css('margin-top', currentTop + 'px');
        });

        // Gerak Bawah
        $('#bawahBtn').click(function(){
            currentTop += 300;
            $('#gambar').css('margin-top', currentTop + 'px');
        });
    });
</script>

</body>
</html>
