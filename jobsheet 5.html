<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Store Customer Registration</title>
<style>
    /* General Styles */
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
        color: #333;
    }

    header, footer {
        background-color: #333;
        color: #fff;
        padding: 15px 20px;
        text-align: center;
    }

    header nav a {
        color: #fff;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
    }

    .container {
        max-width: 700px;
        margin: 30px auto;
        padding: 30px;
        background-color: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #555;
        margin-bottom: 25px;
    }

    .section {
        margin-bottom: 25px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    input[type="radio"], input[type="checkbox"] {
        width: auto;
        margin-right: 10px;
    }

    input[type="range"] {
        width: 100%;
        accent-color: #ff6f61;
        margin-bottom: 15px;
    }

    input[type="submit"] {
        width: 100%;
        background-color: #ff6f61;
        color: white;
        font-size: 16px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    input[type="submit"]:hover {
        background-color: #e85b50;
    }

    .hint {
        font-size: 0.85em;
        color: #888;
        margin-top: -10px;
        margin-bottom: 10px;
    }

    .footer-text {
        font-size: 0.9em;
        color: #aaa;
    }

    /* Inline radio & checkbox labels */
    .inline-label {
        display: inline-block;
        margin-right: 20px;
        font-weight: normal;
    }
</style>
</head>
<body>

<header>
    <nav>
        <a href="#">My Account</a>
        <a href="#">Wish List</a>
        <a href="#">Shopping Cart</a>
        <a href="#">Checkout</a>
    </nav>
</header>

<div class="container">
    <h2>Customer Registration</h2>

    <!-- User Info Section -->
    <div class="section">
        <h3>User Info</h3>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" required>

        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lname" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="xxx@yyy.zzz" required>
        <div class="hint">Enter a valid email address</div>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="8" required>
        <div class="hint">At least 8 characters</div>

        <label for="password2">Repeat Password</label>
        <input type="password" id="password2" name="password2" minlength="8" required>
    </div>

    <!-- Location Section -->
    <div class="section">
        <h3>Location</h3>
        <label for="address">Address</label>
        <input type="text" id="address" name="address">

        <label for="city">City</label>
        <input type="text" id="city" name="city">

        <label for="state">State</label>
        <input type="text" id="state" name="state">

        <label for="zip">Zip</label>
        <input type="text" id="zip" name="zip">

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="NNN-NNN-NNNN">
        <div class="hint">Format: 60+</div>

        <label for="country">Country</label>
        <select id="country" name="country">
            <option value="perak" selected>perak</option>
            <option value="kedah">kedah</option>
            <option value="kuala lumpur">kuala lumpur</option>
            <option value="sabah">sabah</option>
        </select>

        <label>Continent</label>
        <input type="radio" id="na" name="continent" value="semenanjung">
        <label for="na" class="inline-label">semenanjung</label>

        <input type="radio" id="eu" name="continent" value="sabah/sarawak">
        <label for="eu" class="inline-label">sabah/sarawak</label>
    </div>

    <!-- Personal Details Section -->
    <div class="section">
        <h3>Personal Details</h3>
        <label for="bday">Birth Day</label>
        <input type="date" id="bday" name="bday">

        <label for="favcolor">Favorite Color</label>
        <input type="color" id="favcolor" name="favcolor" value="#ff6f61">

        <label for="cat-interest">Interest in Cat</label>
        <input type="range" id="cat-interest" name="cat-interest" min="0" max="10">
        <div class="hint">0 = Minimal, 10 = Love it!</div>
    </div>

    <!-- All Done Section -->
    <div class="section">
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms" style="display:inline;">I agree to the Terms of the Site</label>

        <input type="submit" value="✔ Sign me up!">
    </div>
</div>

<footer>
    <div class="footer-text">Hypothetical Art Store &copy; 2014</div>
</footer>

</body>
</html>
