<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Lab 7 - Shopping Cart</title>
    <link href="styleslilylab9.css" rel="stylesheet" />
    <script src="data.js"></script>
    <script src="function.js"></script>
</head>
<body>
    <div class="title"><h1>SHOPPING CART</h1></div>
    <table class="table-fill">
        <thead>
            <tr>
                <th colspan="2">Product</th>
                <th>#</th>
                <th>Price</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="cart-body">
            </tbody>
        <tfoot>
            <tr class="totals">
                <td colspan="4">Subtotal</td>
                <td id="subtotal-val"></td>
            </tr>
            <tr class="totals">
                <td colspan="4">Tax</td>
                <td id="tax-val"></td>
            </tr>
            <tr class="totals">
                <td colspan="4">Shipping</td>
                <td id="shipping-val"></td>
            </tr>
            <tr class="totals focus">
                <td colspan="4">Grand Total</td>
                <td id="grand-val"></td>
            </tr>
        </tfoot>
    </table>

    <script src="Lab7lily.js"></script>
</body>
</html>
