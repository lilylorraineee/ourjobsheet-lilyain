<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lily & Ain Shopping Cart</title>
    <link rel="stylesheet" href="styleslilylab9.css">
</head>
<body>

<div class="container">
    <div class="title">
        <h1 style="text-align: center; margin-bottom: 20px;">SHOPPING CART</h1>
    </div>

    <table class="table-fill">
        <thead>
            <tr>
                <th colspan="2">Product</th>
                <th>Quantity</th>
                <th>Price ($)</th>
                <th>Amount ($)</th>
            </tr>
        </thead>
        <tbody id="cart-body">
            <tr>
                <td style="text-align:center;"><img src="_Girl_with_a_Pearl_Earring.jpeg" alt="Product"></td>
                <td>Girl with a Pearl Earring</td>
                <td style="text-align:center;"><input type="number" value="3" min="0" class="qty"></td>
                <td class="price">80.00</td>
                <td class="amount"></td>
            </tr>
            <tr>
                <td style="text-align:center;"><img src="artist holding a thistle.jpeg" alt="Product"></td>
                <td>Artist Holding a Thistle</td>
                <td style="text-align:center;"><input type="number" value="1" min="0" class="qty"></td>
                <td class="price">125.00</td>
                <td class="amount"></td>
            </tr>
            <tr>
                <td style="text-align:center;"><img src="Portrait of Eleanor of Toledo.jpeg" alt="Product"></td>
                <td>Portrait of Eleanor of Toledo</td>
                <td style="text-align:center;"><input type="number" value="2" min="0" class="qty"></td>
                <td class="price">75.00</td>
                <td class="amount"></td>
            </tr>
        </tbody>
    </table>

    <div class="summary">
        <p>Subtotal: <span id="subtotal">$0.00</span></p>
        <p>Tax (5%): <span id="tax">$0.00</span></p>
        <p>Shipping: <span id="shipping">$40.00</span></p>
        <p class="total">Grand Total: <span id="grandtotal">$0.00</span></p>
    </div>
</div>

<script src="Lab7lily.js"></script>
</body>
</html>
