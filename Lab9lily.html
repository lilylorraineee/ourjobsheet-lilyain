<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Lab 7 - Shopping Cart</title>
    <link href="styleslilylab9.css" rel="stylesheet" />
    <script src="datalily.js"></script>
    <script src="function.js"></script>
</head>
<body>
    <div class="title"><h1>Shopping Cart</h1></div>
    <table class="table-fill">
        <thead>
            <tr>
                <th colspan="2">Product</th>
                <th>#</th>
                <th>Price</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <script src="Lab7lily.js"></script>
            <tr class="totals">
                <td colspan="4">Subtotal</td>
                <td><script>outputCurrency(subtotal);</script></td>
            </tr>
            <tr class="totals">
                <td colspan="4">Tax</td>
                <td><script>outputCurrency(tax);</script></td>
            </tr>
            <tr class="totals">
                <td colspan="4">Shipping</td>
                <td><script>outputCurrency(shipping);</script></td>
            </tr>
            <tr class="totals focus">
                <td colspan="4">Grand Total</td>
                <td><script>outputCurrency(grand);</script></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
