<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FAMOUS DESTINATION TO VISIT</title>
    <style>
        /* CSS untuk Progress Bar */
        progress {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            height: 12px;
            border-radius: 10px; /* Bagi hujung dia melengkung (tak petak) */
            overflow: hidden;    /* Pastikan warna dalam pun melengkung */
            border: 1px solid #ccc; /* Border halus macam rujukan */
        }

        /* 1. Bar Atas: Meter Value (Hijau & Pendek) */
        #meterBar {
            width: 100px;
        }
        /* Warna Hijau untuk Chrome/Safari/Edge */
        #meterBar::-webkit-progress-value {
            background-color: #008000;
            border-radius: 10px 0 0 10px; /* Melengkung di depan sahaja */
        }
        /* Warna Hijau untuk Firefox */
        #meterBar::-moz-progress-bar {
            background-color: #008000;
            border-radius: 10px;
        }

        /* 2. Bar Bawah: Progress Value (Biru & Panjang) */
        #progressBar {
            width: 180px;
        }
        #progressBar::-webkit-progress-value {
            background-color: #007bff;
            border-radius: 10px 0 0 10px;
        }
        #progressBar::-moz-progress-bar {
            background-color: #007bff;
            border-radius: 10px;
        }

        /* Background kelabu cair untuk bar */
        progress::-webkit-progress-bar {
            background-color: #f3f3f3;
            border-radius: 10px;
        }

        /* Susunan Sebaris */
        .progress-row {
            margin-bottom: 10px;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
        }
        .progress-row span {
            margin-right: 10px;
            min-width: 150px;
        }
    </style>
</head>
